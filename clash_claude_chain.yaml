# Clash Verge Merge Profile for Claude Proxy Chaining
# 作用: 将美国 Socks5 节点注入到所有的代理组中，直接通过规则使用，放弃外挂独立的 select 组（因为 UI 经常无法渲染）。

proxies:
  - name: "US-Claude-Socks5"
    type: socks5
    server: 77.111.118.251
    port: 42136
    username: "1EDHhzBv3DDgLSe"
    password: "dwi3ANd0cvCUBWv"
    udp: true
    # 注意：这里指定前置节点为 JP-3
    dialer-proxy: "JP-3"

prepend-proxy-groups:
  - name: "Claude-Chain"
    type: select
    proxies:
      - "US-Claude-Socks5"

append-proxy-groups:
  - name: "PROXIES" # 尝试将新组挂载到默认的全局组
    proxies:
      - "Claude-Chain"

rules:
  - DOMAIN-SUFFIX,claude.ai,Claude-Chain
  - DOMAIN-SUFFIX,anthropic.com,Claude-Chain
  - DOMAIN-SUFFIX,chatgpt.com,Claude-Chain
  - DOMAIN-SUFFIX,openai.com,Claude-Chain